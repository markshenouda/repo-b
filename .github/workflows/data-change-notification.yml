name: Data Change Notification

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Source repository'
        required: true
      commit_sha:
        description: 'Commit SHA'
        required: true
      commit_message:
        description: 'Commit message'
        required: true
      author:
        description: 'Commit author'
        required: true
      changed_files:
        description: 'Changed files (JSON array)'
        required: true
      timestamp:
        description: 'Commit timestamp'
        required: true
      compare_url:
        description: 'Compare URL'
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Display received inputs
        run: |
          echo "Notification triggered from: ${{ github.event.inputs.repository }}"
          echo "Commit: ${{ github.event.inputs.commit_sha }}"
          echo "Author: ${{ github.event.inputs.author }}"
          echo "Message: ${{ github.event.inputs.commit_message }}"
          echo "Changed files: ${{ github.event.inputs.changed_files }}"
          echo "Timestamp: ${{ github.event.inputs.timestamp }}"

      - name: Create notification branch
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          COMMIT_SHORT="${{ github.event.inputs.commit_sha }}"
          COMMIT_SHORT=${COMMIT_SHORT:0:7}
          BRANCH_NAME="data-change-notification-${COMMIT_SHORT}-${TIMESTAMP}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "COMMIT_SHORT=$COMMIT_SHORT" >> $GITHUB_ENV

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git checkout -b $BRANCH_NAME
          echo "✅ Created branch: $BRANCH_NAME"

      - name: Create notifications directory
        run: |
          mkdir -p data/notifications
          echo "✅ Created notifications directory"

      - name: Generate notification file
        run: |
          NOTIFICATION_FILE="data/notifications/change-${{ env.TIMESTAMP }}.md"

          cat > "$NOTIFICATION_FILE" << 'EOF'
          # Data Change Notification

          **Repository**: ${{ github.event.inputs.repository }}
          **Commit**: ${{ github.event.inputs.commit_sha }}
          **Author**: ${{ github.event.inputs.author }}
          **Timestamp**: ${{ github.event.inputs.timestamp }}

          ## Commit Message
          ```
          ${{ github.event.inputs.commit_message }}
          ```

          ## Changed Files
          EOF

          echo '${{ github.event.inputs.changed_files }}' | jq -r '.[] | "- `" + . + "`"' >> "$NOTIFICATION_FILE"

          cat >> "$NOTIFICATION_FILE" << 'EOF'

          ## Summary

          This notification was automatically generated when changes were detected in the data folder of the source repository.

          ## Actions Required

          - [ ] Review the changed files for any breaking changes
          - [ ] Update dependent configurations if necessary
          - [ ] Verify that the changes don't conflict with existing settings
          - [ ] Test the application with the new data
          - [ ] Update documentation if needed

          ## Links

          - [View Changes](${{ github.event.inputs.compare_url }})
          - [Commit Details](https://github.com/${{ github.event.inputs.repository }}/commit/${{ github.event.inputs.commit_sha }})
          - [Source Repository](https://github.com/${{ github.event.inputs.repository }})

          ---

          *This PR was automatically created by the cross-repository notification system.*
          *Generated at: ${{ github.event.inputs.timestamp }}*
          EOF

          echo "✅ Created notification file: $NOTIFICATION_FILE"
          echo "NOTIFICATION_FILE=$NOTIFICATION_FILE" >> $GITHUB_ENV

      - name: Commit notification file
        run: |
          git add data/notifications/
          git commit -m "Add data change notification from ${{ github.event.inputs.repository }}

          - Commit: ${{ env.COMMIT_SHORT }}
          - Author: ${{ github.event.inputs.author }}
          - Files: ${{ github.event.inputs.changed_files }}
          - Timestamp: ${{ github.event.inputs.timestamp }}"

          git push origin ${{ env.BRANCH_NAME }}
          echo "✅ Committed and pushed notification file"

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = ${{ toJSON(github.event.inputs.changed_files) }};
            const fileCount = changedFiles.length;
            const fileList = changedFiles.map(file => `- \`${file}\``).join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Data Change Notification: ${process.env.COMMIT_SHORT}`,
              head: process.env.BRANCH_NAME,
              base: 'main',
              body: `## Data Change Detected

              A change was detected in the data folder of **${{ github.event.inputs.repository }}**.

              ### Change Details

              | Field | Value |
              |-------|-------|
              | **Repository** | ${{ github.event.inputs.repository }} |
              | **Commit** | \`${{ github.event.inputs.commit_sha }}\` |
              | **Author** | ${{ github.event.inputs.author }} |
              | **Timestamp** | ${{ github.event.inputs.timestamp }} |
              | **Files Changed** | ${fileCount} file(s) |

              ### Commit Message
              \`\`\`
              ${{ github.event.inputs.commit_message }}
              \`\`\`

              ### Changed Files
              ${fileList}

              ### Quick Links
              - [View Changes](${{ github.event.inputs.compare_url }})
              - [Commit Details](https://github.com/${{ github.event.inputs.repository }}/commit/${{ github.event.inputs.commit_sha }})
              - [Source Repository](https://github.com/${{ github.event.inputs.repository }})

              ### Next Steps
              - Review the notification file in \`${process.env.NOTIFICATION_FILE}\`
              - Check if any dependent configurations need updates
              - Verify compatibility with existing systems
              - Merge this PR to acknowledge the notification

              ---

              *This PR was automatically created by the cross-repository notification system.*
              *Generated at: ${{ github.event.inputs.timestamp }}*`
            });

            console.log(`✅ Created PR #${pr.number}: ${pr.html_url}`);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['data-notification', 'data-change', 'automated']
            });

            console.log('✅ Added labels to PR');

      - name: Summary
        run: |
          echo "✅ Notification processing completed successfully!"
          echo "📝 Notification file created: ${{ env.NOTIFICATION_FILE }}"
          echo "🌿 Branch created: ${{ env.BRANCH_NAME }}"
          echo "🔗 PR created with change details"
          echo "🏷️ Labels added: data-notification, data-change, automated"
