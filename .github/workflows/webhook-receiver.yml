name: Data Change Notification PR Creator

on:
  repository_dispatch:
    types: [data_folder_changed]

jobs:
  create-notification-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Display received webhook payload
        run: |
          echo "🔔 Webhook received from: ${{ github.event.client_payload.repository }}"
          echo "📝 Commit: ${{ github.event.client_payload.commit_sha }}"
          echo "👤 Author: ${{ github.event.client_payload.author }}"
          echo "💬 Message: ${{ github.event.client_payload.commit_message }}"
          echo "📁 Changed files: ${{ github.event.client_payload.changed_files }}"
          echo "🕐 Timestamp: ${{ github.event.client_payload.timestamp }}"

      - name: Create notification branch
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          COMMIT_SHORT="${{ github.event.client_payload.commit_sha }}"
          COMMIT_SHORT=${COMMIT_SHORT:0:7}
          BRANCH_NAME="data-change-notification-${COMMIT_SHORT}-${TIMESTAMP}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "COMMIT_SHORT=$COMMIT_SHORT" >> $GITHUB_ENV
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git checkout -b $BRANCH_NAME
          echo "✅ Created branch: $BRANCH_NAME"

      - name: Create notifications directory
        run: |
          mkdir -p data/notifications
          echo "✅ Created notifications directory"

      - name: Generate notification file
        run: |
          NOTIFICATION_FILE="data/notifications/change-${{ env.TIMESTAMP }}.md"
          
          cat > "$NOTIFICATION_FILE" << 'EOF'
          # Data Change Notification
          
          **Repository**: ${{ github.event.client_payload.repository }}
          **Commit**: ${{ github.event.client_payload.commit_sha }}
          **Author**: ${{ github.event.client_payload.author }}
          **Timestamp**: ${{ github.event.client_payload.timestamp }}
          
          ## Commit Message
          ```
          ${{ github.event.client_payload.commit_message }}
          ```
          
          ## Changed Files
          EOF
          
          # Parse and format the changed files JSON array
          echo '${{ toJSON(github.event.client_payload.changed_files) }}' | jq -r '.[] | "- `" + . + "`"' >> "$NOTIFICATION_FILE"
          
          cat >> "$NOTIFICATION_FILE" << 'EOF'
          
          ## Summary
          
          This notification was automatically generated when changes were detected in the data folder of the source repository. The changes include modifications to configuration files, user data, or content that may affect the application behavior.
          
          ## Actions Required
          
          - [ ] Review the changed files for any breaking changes
          - [ ] Update dependent configurations if necessary
          - [ ] Verify that the changes don't conflict with existing settings
          - [ ] Test the application with the new data
          - [ ] Update documentation if needed
          
          ## Links
          
          - [View Changes](${{ github.event.client_payload.compare_url }})
          - [Commit Details](https://github.com/${{ github.event.client_payload.repository }}/commit/${{ github.event.client_payload.commit_sha }})
          - [Source Repository](https://github.com/${{ github.event.client_payload.repository }})
          
          ---
          
          *This PR was automatically created by the cross-repository webhook system.*
          *Generated at: ${{ github.event.client_payload.timestamp }}*
          EOF
          
          echo "✅ Created notification file: $NOTIFICATION_FILE"
          echo "NOTIFICATION_FILE=$NOTIFICATION_FILE" >> $GITHUB_ENV

      - name: Commit notification file
        run: |
          git add data/notifications/
          git commit -m "Add data change notification from ${{ github.event.client_payload.repository }}
          
          - Commit: ${{ env.COMMIT_SHORT }}
          - Author: ${{ github.event.client_payload.author }}
          - Files: ${{ github.event.client_payload.changed_files }}
          - Timestamp: ${{ github.event.client_payload.timestamp }}"
          
          git push origin ${{ env.BRANCH_NAME }}
          echo "✅ Committed and pushed notification file"

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = ${{ toJSON(github.event.client_payload.changed_files) }};
            const fileCount = changedFiles.length;
            const fileList = changedFiles.map(file => `- \`${file}\``).join('\n');
            
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔔 Data Change Notification: ${process.env.COMMIT_SHORT}`,
              head: process.env.BRANCH_NAME,
              base: 'main',
              body: `## 📊 Data Change Detected
              
              A change was detected in the data folder of **${{ github.event.client_payload.repository }}**.
              
              ### 📋 Change Details
              
              | Field | Value |
              |-------|-------|
              | **Repository** | ${{ github.event.client_payload.repository }} |
              | **Commit** | \`${{ github.event.client_payload.commit_sha }}\` |
              | **Author** | ${{ github.event.client_payload.author }} |
              | **Timestamp** | ${{ github.event.client_payload.timestamp }} |
              | **Files Changed** | ${fileCount} file(s) |
              
              ### 💬 Commit Message
              \`\`\`
              ${{ github.event.client_payload.commit_message }}
              \`\`\`
              
              ### 📁 Changed Files
              ${fileList}
              
              ### 🔗 Quick Links
              - [📊 View Changes](${{ github.event.client_payload.compare_url }})
              - [📝 Commit Details](https://github.com/${{ github.event.client_payload.repository }}/commit/${{ github.event.client_payload.commit_sha }})
              - [🏠 Source Repository](https://github.com/${{ github.event.client_payload.repository }})
              
              ### ✅ Next Steps
              - Review the notification file in \`${process.env.NOTIFICATION_FILE}\`
              - Check if any dependent configurations need updates
              - Verify compatibility with existing systems
              - Merge this PR to acknowledge the notification
              
              ---
              
              🤖 *This PR was automatically created by the cross-repository webhook system.*
              ⏰ *Generated at: ${{ github.event.client_payload.timestamp }}*`
            });
            
            console.log(`✅ Created PR #${pr.number}: ${pr.html_url}`);
            
            // Add labels to the PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['webhook-notification', 'data-change', 'automated']
            });
            
            console.log('✅ Added labels to PR');

      - name: Summary
        run: |
          echo "🎉 Webhook processing completed successfully!"
          echo "📝 Notification file created: ${{ env.NOTIFICATION_FILE }}"
          echo "🌿 Branch created: ${{ env.BRANCH_NAME }}"
          echo "🔗 PR created with change details"
          echo "🏷️ Labels added: webhook-notification, data-change, automated"